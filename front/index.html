<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🦑️ OctoFlow</title>

    <script>
        const saved = localStorage.getItem("theme")
        if (saved !== "light") document.documentElement.classList.add("dark")
    </script>

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="/static/css/style.css" rel="stylesheet" />
    <link href="/static/css/cards.css" rel="stylesheet" />
    <link href="/static/css/detailPanel.css" rel="stylesheet" />
    <link href="/static/css/droneFlights.css" rel="stylesheet" />
    <link href="/static/css/droneOperations.css" rel="stylesheet" />

    <!-- JS -->
    <script src="/static/js/app.js" type="module" defer></script>
    <script src="/static/js/theme.js" defer></script>
</head>

<body>
    <div class="d-flex align-items-center gap-3 p-3">
        <img src="/static/img/OctoFlow_logo.png" alt="OctoFlow" height="36" />
        <input type="text" class="form-control w-auto" placeholder="Rechercher..." />

        <button class="btn-create">Créer une ressource</button>
        <button id="themeToggle" class="btn-theme" title="Toggle theme">
            <i class="bi bi-moon-fill"></i>
        </button>
    </div>

    <!-- Drone grid -->
    <div id="drone-grid" class="drone-grid px-3 pb-3"></div>

    <!-- Overlay -->
    <div id="panel-overlay" class="hidden"></div>

    <!-- Detail panel -->
    <div id="detail-panel" class="detail-panel hidden">
        <div id="detail-panel-content">

            <!-- Header -->
            <div id="detail-panel-header">
                <div id="detail-header-left">
                    <img id="detail-photo" src="/static/img/OctoFlow_logo.png" />
                    <div id="detail-text">
                        <h4 id="detail-title"></h4>
                        <p id="detail-description"></p>
                    </div>
                </div>
                <button id="btn-detail-close">✖</button>
            </div>

            <!-- Tab bar -->
            <div id="detail-tabs">
                <button class="detail-tab active" data-tab="details">Détails</button>
                <button class="detail-tab" data-tab="flights">Vols</button>
                <button class="detail-tab" data-tab="operations">Opérations</button>
            </div>

            <!-- Body (content injected per tab) -->
            <div id="detail-body"></div>

            <!-- Footer (injected by detailPanel.js) -->
            <div id="detail-footer"></div>

        </div>
    </div>
</body>

</html>
