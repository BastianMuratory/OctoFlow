<div class="operations-container">
    <table class="operations-table">
        <thead>
            <tr>
                <th>Date</th>
                <th>Opération</th>
                <th>Description</th>
                <th>Réalisé par</th>
                <th>Validé par</th>
                <th>Coût matériel (€)</th>
                <th>Remarques</th>
            </tr>
        </thead>
        <tbody class="operations-body"></tbody>
        <tfoot>
            <tr class="operations-add-row">
                <td></td>
                <td><input type="text" class="op-type detail-input" placeholder="Opération" /></td>
                <td><input type="text" class="op-description detail-input" placeholder="Description" /></td>
                <td><input type="text" class="op-done-by detail-input" placeholder="Réalisé par" /></td>
                <td><input type="text" class="op-validated-by detail-input" placeholder="Validé par" /></td>
                <td><input type="number" class="op-cost detail-input" placeholder="0.00" step="0.01" min="0" /></td>
                <td><input type="text" class="op-comments detail-input" placeholder="Remarques" /></td>
            </tr>
            <tr>
                <td colspan="7" style="padding: 6px 12px; text-align: right;">
                    <button class="btn-action btn-save btn-add-operation">+ Ajouter</button>
                </td>
            </tr>
        </tfoot>
    </table>
    <div class="operations-count">0 opération(s)</div>
</div>
